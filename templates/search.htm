
<!DOCTYPE html>

<html lang="en" data-browser="Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:121.0) Gecko/20100101 Firefox/121.0">
<head>

<meta http-equiv="content-type" content="text/html; charset=UTF-8">
<meta charset="utf-8">
<title>Search | Cardwatcher
</title>
<meta name="author" content="Sammelkartenmarkt GmbH &amp; Co. KG">
<meta name="description" content="">
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
<meta name="robots" content="noIndex,follow">
<!--[if IE]>
<link rel="shortcut icon" href="//static.cardmarket.com/img/c0a10b062a8c3b48a5c29b779b3ac51e/static/misc/favicon.ico?>">
<![endif]-->
<meta name="msapplication-TileColor" content="#ffffff">
<meta name="msapplication-TileImage" content="//static.cardmarket.com/img/526dbb9ae52c5e62404fe903e9769807/static/misc/mstile-144x144.png">
<link href="{{ url_for('static', filename='Search/master.min.css') }}" rel="stylesheet">
<link href="{{ url_for('static', filename='Search/product_search.min.css') }}" rel="stylesheet">
</head>

<body>
<div tabindex="-1" aria-hidden="true" id="modal" class="modal">
<div class="modal-dialog">
<div class="modal-content">
</div>
</div>
</div>
<header id="header" class="fixed-top">
	<nav class="navbar navbar-light">
		<a href="/" class="navbar-brand">
			<span style="font-family:var(--bs-body-font-family);font-weight:bold;font-size:32px;" class="me-2">
			CardWatcher
			</span>
		</a>
		
		<!-- 
		<a class="btn btn-primary" style="background-color:rgba(34,139,34,1);border-color:rgba(34,139,34,1);" href="/?update=true">Update All</a>
		-->
		</nav>
	<nav class="navbar navbar-light">
		<form method="GET" id="searchForm" action="/" class="justify-content-center">
			<div id="Search" class="form-group mb-0">
				<div id="autoCompWrapper" class="input-group input-group-sm autocomplete-wrapper show container">
				<input type="text" name="searchString" id="ProductSearchInput" placeholder="Search CardWatcher..." aria-label="Search" class="form-control autocomplete-input">

				<button type="submit" id="search-btn" title="Suche" class="btn btn-light">
				<span class="mx-2 mx-lg-4 fw-bold ">Suche
				</span>
				</button>
				</div>
			</div>
		</form>
	</nav>
<!-- Download Control Bar -->
<nav class="navbar navbar-light" style="padding: 4px 16px; border-top: 1px solid #dee2e6;">
	<div id="downloadBar" style="display: flex; align-items: center; gap: 12px; font-size: 14px; width: 100%;">
		<button id="downloadStartBtn" onclick="startDownload()" class="btn btn-sm btn-success" style="min-width: 80px;">
			Start Download
		</button>
		<button id="downloadStopBtn" onclick="stopDownload()" class="btn btn-sm btn-danger" style="min-width: 80px; display: none;">
			Stop
		</button>
		<div id="downloadProgress" style="flex: 1; display: none; align-items: center; gap: 12px;">
			<div style="flex: 1; background: #e9ecef; border-radius: 4px; height: 20px; overflow: hidden;">
				<div id="progressBar" style="height: 100%; background: #28a745; transition: width 0.3s; width: 0%;"></div>
			</div>
			<span id="progressText" style="min-width: 120px; text-align: right;">0 / 0</span>
		</div>
		<span id="downloadStatus" style="color: #6c757d;">Ready</span>
		<span id="waitTimer" style="color: #6c757d; display: none;"></span>
	</div>
</nav>
</header>


<main class="container" style="padding-top: 140px;">
<h1 class="H1_PageTitle page-header">Articles
</h1>
<div class="row mb-3">
	<div class="col-12">
		<form method="GET" action="/" class="row g-2 align-items-center">
			<input type="hidden" name="searchString" id="searchStringHidden" value="{{ request.args.get('searchString', '') }}">
			<div class="col-auto">
				<label for="sortBy" class="col-form-label">Sort by:</label>
			</div>
			<div class="col-auto">
				<select name="sortBy" id="sortBy" class="form-select form-select-sm" onchange="document.getElementById('order').value = (this.value === 'name' ? 'asc' : 'desc'); this.form.submit()">
					<option value="name" {% if request.args.get('sortBy', 'name') == 'name' %}selected{% endif %}>Name</option>
					<option value="price" {% if request.args.get('sortBy', 'name') == 'price' %}selected{% endif %}>Price</option>
					<option value="priceChange" {% if request.args.get('sortBy', 'name') == 'priceChange' %}selected{% endif %}>Price Change (€)</option>
					<option value="percentChange" {% if request.args.get('sortBy', 'name') == 'percentChange' %}selected{% endif %}>Percentage Change (%)</option>
				</select>
			</div>
			<div class="col-auto">
				<label for="order" class="col-form-label">Order:</label>
			</div>
			<div class="col-auto">
				<select name="order" id="order" class="form-select form-select-sm" onchange="this.form.submit()">
					<option value="asc" {% if sort_order == 'asc' %}selected{% endif %}>Ascending</option>
					<option value="desc" {% if sort_order == 'desc' %}selected{% endif %}>Descending</option>
				</select>
			</div>
			<div class="col-auto">
				<label for="pricePeriod" class="col-form-label">Price Period:</label>
			</div>
			<div class="col-auto">
				<select name="pricePeriod" id="pricePeriod" class="form-select form-select-sm" onchange="this.form.submit()">
					<option value="last" {% if request.args.get('pricePeriod', 'last') == 'last' %}selected{% endif %}>Last Download</option>
					<option value="1w" {% if request.args.get('pricePeriod', 'last') == '1w' %}selected{% endif %}>1 Week</option>
					<option value="1m" {% if request.args.get('pricePeriod', 'last') == '1m' %}selected{% endif %}>1 Month</option>
					<option value="2m" {% if request.args.get('pricePeriod', 'last') == '2m' %}selected{% endif %}>2 Months</option>
					<option value="6m" {% if request.args.get('pricePeriod', 'last') == '6m' %}selected{% endif %}>6 Months</option>
				</select>
			</div>
		</form>
	</div>
</div>
<section style="margin-bottom: 75.1667px; padding-bottom: 5rem;">

<div class="row">
	{{  search_elements  |  safe  }}
</div>
</section>
</main>

<script>
let pollInterval = null;

function startDownload() {
	fetch('/api/download/start', { method: 'POST' })
		.then(r => r.json())
		.then(data => {
			if (data.success) {
				startPolling();
			} else {
				alert(data.message);
			}
		})
		.catch(err => alert('Error: ' + err));
}

function stopDownload() {
	fetch('/api/download/stop', { method: 'POST' })
		.then(r => r.json())
		.then(data => {
			if (!data.success) {
				alert(data.message);
			}
		})
		.catch(err => alert('Error: ' + err));
}

function updateUI(data) {
	const startBtn = document.getElementById('downloadStartBtn');
	const stopBtn = document.getElementById('downloadStopBtn');
	const progress = document.getElementById('downloadProgress');
	const progressBar = document.getElementById('progressBar');
	const progressText = document.getElementById('progressText');
	const statusText = document.getElementById('downloadStatus');
	const waitTimer = document.getElementById('waitTimer');

	const isRunning = data.status === 'running' || data.status === 'waiting' || data.status === 'stopping';

	startBtn.style.display = isRunning ? 'none' : 'inline-block';
	stopBtn.style.display = isRunning ? 'inline-block' : 'none';
	stopBtn.disabled = data.status === 'stopping';
	stopBtn.textContent = data.status === 'stopping' ? 'Stopping...' : 'Stop';

	if (isRunning || data.completed > 0 || data.failed > 0) {
		progress.style.display = 'flex';
		progressBar.style.width = data.progress_percent + '%';
		progressText.textContent = (data.completed + data.failed) + ' / ' + data.total;
		if (data.skipped > 0) {
			progressText.textContent += ' (' + data.skipped + ' skipped)';
		}
	} else {
		progress.style.display = 'none';
	}

	if (data.status === 'idle') {
		if (data.completed > 0 || data.failed > 0) {
			statusText.textContent = 'Done: ' + data.completed + ' ok, ' + data.failed + ' failed';
			statusText.style.color = data.failed > 0 ? '#dc3545' : '#28a745';
		} else {
			statusText.textContent = 'Ready';
			statusText.style.color = '#6c757d';
		}
		waitTimer.style.display = 'none';
	} else if (data.status === 'waiting') {
		statusText.textContent = 'Waiting...';
		statusText.style.color = '#ffc107';
		if (data.wait_remaining > 0) {
			const mins = Math.floor(data.wait_remaining / 60);
			const secs = data.wait_remaining % 60;
			waitTimer.textContent = mins + 'm ' + secs + 's';
			waitTimer.style.display = 'inline';
		}
	} else if (data.status === 'running') {
		const pageName = data.current_page || '';
		const shortName = pageName.length > 40 ? '...' + pageName.slice(-37) : pageName;
		statusText.textContent = shortName;
		statusText.style.color = '#007bff';
		waitTimer.style.display = 'none';
	} else if (data.status === 'stopping') {
		statusText.textContent = 'Stopping...';
		statusText.style.color = '#dc3545';
		waitTimer.style.display = 'none';
	}
}

function pollStatus() {
	fetch('/api/download/status')
		.then(r => r.json())
		.then(data => {
			updateUI(data);
			if (data.status === 'idle' && pollInterval) {
				clearInterval(pollInterval);
				pollInterval = null;
			}
		})
		.catch(err => console.error('Poll error:', err));
}

function startPolling() {
	if (pollInterval) return;
	pollStatus();
	pollInterval = setInterval(pollStatus, 1000);
}

// Check status on page load
document.addEventListener('DOMContentLoaded', function() {
	fetch('/api/download/status')
		.then(r => r.json())
		.then(data => {
			updateUI(data);
			if (data.status !== 'idle') {
				startPolling();
			}
		});
});
</script>
</body>
</html>
